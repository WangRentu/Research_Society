defaults:
  - /solver/client@crossover.llm.client: litellm_4o

crossover:
  _target_: dojo.config_dataclasses.operators.base.OperatorConfig
  llm:
    _target_: dojo.config_dataclasses.llm.generic_llm.GenericLLMConfig
    client: ???
    generation_kwargs: {}
  system_message_prompt_template:
    _target_: dojo.config_dataclasses.llm.jinjaprompt.JinjaPromptConfig
    template: |
      # Introduction:
      You are a Kaggle grandmaster attending a competition.
      You have two previously developed solutions. Your goal is to combine them into a single,
      improved solution that outperforms both.

      # Task Description:
      {{task_desc}}

      {% if memory %}
      # Memory:
      {{memory}}
      {% endif %}

      # Previous Solution 1:
      ## Code:
      {{prev_code1}}

      # Previous Solution 2:
      ## Code:
      {{prev_code2}}

      # Instructions:
      ## Response Format:
      Your response should be a brief outline/sketch of your proposed crossover solution in natural
      language (3-5 sentences),
      followed by a single markdown code block (wrapped in ```) which implements the combined solution
      and prints out the evaluation metric.
      There should be no additional headings or text in your response. Just natural language text
      followed by a newline and then the markdown code block.

      ## Crossover sketch guideline:
      Describe how you plan to combine the two solutions. Be specific about what you take from each
      solution and why. The sketch should be 3-5 sentences.
      Don't suggest to do EDA.

      ## Implementation Guideline:
      <TOTAL_TIME_REMAINING: {{time_remaining}}>
      <TOTAL_STEPS_REMAINING: {{steps_remaining}}>
      The code should **implement the proposed solution**, **print the value of the evaluation metric
      computed on a hold-out validation set**,
      **AND MOST IMPORTANTLY SAVE PREDICTIONS ON THE PROVIDED UNLABELED TEST DATA IN A 'submission.csv'
      FILE IN THE CURRENT DIRECTORY.**
      The code should be a single-file python program that is self-contained and can be executed as-is.
      No parts of the code should be skipped, don't terminate the before finishing the script.
      Your response should only contain a single code block.
      Be aware of the running time of the code, it should complete within {{execution_timeout}}.
      All the provided input data is stored in "./data" directory.
      **If there is test data provided for this task, please save the test predictions in a
      'submission.csv' file in the "./" directory as described in the task description** This is
      extremely important since this file is used for grading/evaluation. DO NOT FORGET THE
      submission.csv file!
      You can also use the current directory to store any temporary files that your code needs to create.
      REMEMBER THE ./submission.csv FILE!!!!! The correct directory is important too.

      {% if other_remarks %}
      # Other Remarks:
      {{other_remarks}}
      {% endif %}

    input_variables:
      - task_desc
      - execution_timeout
      - packages
      - prev_code1
      - prev_code2
      - memory
      - time_remaining
      - steps_remaining
      - other_remarks
