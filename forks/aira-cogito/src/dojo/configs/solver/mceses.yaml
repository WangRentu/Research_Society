defaults:
  - memory: simple_memory  # Enables Memory operator
  - memory@debug_memory: debug_memory # Enables Debug Memory operator

_target_: dojo.config_dataclasses.solver.mceses.MCESESSolverConfig

# --- Output Configuration ---
export_search_results: true

# --- Search Configuration ---
improvement_steps: 5
step_limit: 500
data_preview: false
execution_timeout: 14400
time_limit_secs: 86400

# --- Debugging Configuration ---
max_debug_depth: ???
debug_prob: ???

# --- Drafting Configuration ---
num_drafts: ???
max_llm_call_retries: 3

use_test_score: false
use_complexity: false

# --- MC-ESES-specific ---
reflect_after_every_step: true
managed_evolution: true
triggered_reflection: true
reflect_on_routine: false
max_state_history: 50

# --- MC-ESES search over cognitive state space ---
# num_children=1 yields a degenerate chain; num_children>1 enables branching tree search
use_tree_search: true
uct_c: 0.25
num_children: 5
max_cs_tree_depth: 10
max_debug_time: 600

# --- Phase B: strategy-driven action selection ---
strategy_driven: true
state_guided_policy: true
avoid_dead_end_improve: true

# --- Phase B: expansion diversity ---
diverse_expansion: true
adaptive_children: true
low_conf_children: 5
mid_conf_children: 3
high_conf_children: 1
low_conf_threshold: 0.3
high_conf_threshold: 0.7

# --- Managed evolution ---
plateau_window: 3
bug_streak_window: 3
score_jump_threshold: 0.05
state_decay_on_plateau: true
plateau_decay_rate: 0.3
hard_reset_on_bug_streak: true

# --- Experiment instrumentation ---
save_trajectory: true

# --- Causal intervention (Exp 3) ---
intervention_mode: natural
intervention_freeze_step: 5
scramble_source_path: ""

# --- Phase B: multi-dimensional backpropagation ---
backprop_metric_weight: 0.6
backprop_validity_weight: 0.2
backprop_improvement_weight: 0.2

# --- Phase B: intrinsic quality in UCT ---
intrinsic_quality_weight: 0.2

# --- Phase B: cross-branch knowledge transfer ---
crossover_enabled: true
crossover_top_k: 3

# --- Environment Configuration ---
available_packages:
  - numpy
  - pandas
  - scikit-learn
  - statsmodels
  - xgboost
  - lightgbm
  - torch
  - torchvision
  - torch-geometric
  - bayesian-optimization
  - timm
