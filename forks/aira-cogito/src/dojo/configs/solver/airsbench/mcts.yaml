defaults:
  - mcts
  - /solver/operators@operators:
    - airsbench/aira_operators/debug
    - airsbench/aira_operators/draft
    - airsbench/aira_operators/improve
    - airsbench/aide_operators/analyze
  - override memory: simple_memory
  - override memory@debug_memory: debug_memory

_target_: dojo.config_dataclasses.solver.mcts.MCTSSolverConfig

export_search_results: true

step_limit: 10000
num_children: 5
uct_c: 0.25
max_debug_depth: 20
data_preview: True
max_debug_time: 1e9

use_test_score: False
use_complexity: False

operators:
  draft:
    llm:
      generation_kwargs:
        temperature: 0.6
        top_p: 0.95
  improve:
    llm:
      generation_kwargs:
        temperature: 0.6
        top_p: 0.95
  debug:
    llm:
      generation_kwargs:
        temperature: 0.6
        top_p: 0.95
  analyze:
    llm:
      generation_kwargs:
        temperature: 0.5
