defaults:
  - greedy
  - /solver/operators/airsbench@operators:
    - mceses_operators/debug
    - mceses_operators/draft
    - mceses_operators/improve
    - aide_operators/analyze
    - mceses_operators/reflect
  - override memory: simple_memory
  - override memory@debug_memory: debug_memory

# --- Search Configuration (same as original Greedy) ---
improvement_steps: 5

data_preview: true

# --- Debugging Configuration ---
max_debug_depth: 20

debug_prob: 1.0

# --- Drafting Configuration ---
num_drafts: 5

max_llm_call_retries: 3

# --- Cognitive State (the only addition to Greedy) ---
use_cognitive_state: true
reflect_after_every_step: true
save_trajectory: true
intervention_mode: natural
intervention_freeze_step: 5
scramble_source_path: ""

# --- Managed Evolution (NAT+) ---
managed_evolution: false
triggered_reflection: true
reflect_on_routine: false
plateau_window: 3
bug_streak_window: 3
score_jump_threshold: 0.05
state_decay_on_plateau: true
plateau_decay_rate: 0.3
hard_reset_on_bug_streak: true
max_state_history: 50
